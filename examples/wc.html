<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liquid QV — Web Component example</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 24px;
        max-width: 1200px;
        margin: 0 auto;
      }
      h1 {
        font-size: 24px;
      }
      pre {
        background: #f4f4f0;
        padding: 12px;
        border-radius: 8px;
        overflow: auto;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Liquid QV as a Web Component</h1>
    <p>
      Drop the <code>&lt;liquid-qv&gt;</code> custom element into any HTML page after loading the
      script.
    </p>

    <pre>
&lt;script type="module" src="liquid-qv.wc.js"&gt;&lt;/script&gt;
&lt;liquid-qv credit-budget="100"&gt;&lt;/liquid-qv&gt;</pre
    >

    <hr style="margin: 32px 0; border: none; border-top: 1px solid #ddd" />

    <liquid-qv credit-budget="100"></liquid-qv>

    <script type="module" src="../dist-wc/liquid-qv.wc.js"></script>
  </body>
</html>
